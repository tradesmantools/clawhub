name: Deploy

on:
  push:
    tags:
      - 'deploy-*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy audit record
        run: |
          echo "Deploy $(git describe --tags --always) at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy-audit.log
          echo "Commit: $(git rev-parse HEAD)"
          echo "Tag: $(git describe --tags --always)"
